suite: rbac
tests:
  - it: grants get on cronjobs and create+list on jobs
    template: templates/role.yaml
    asserts:
      - isKind:
          of: Role
      - contains:
          path: rules
          content:
            apiGroups: ["batch"]
            resources: ["cronjobs"]
            verbs: ["get"]
      - contains:
          path: rules
          content:
            apiGroups: ["batch"]
            resources: ["jobs"]
            verbs: ["create", "list"]

  - it: defaults the RBAC namespace to the release namespace
    template: templates/role.yaml
    release:
      namespace: renovate
    asserts:
      - equal:
          path: metadata.namespace
          value: renovate

  - it: targets config.cronjob.namespace when set
    template: templates/role.yaml
    set:
      config.cronjob.namespace: ci-jobs
    asserts:
      - equal:
          path: metadata.namespace
          value: ci-jobs

  - it: binds the Role to the service account
    template: templates/rolebinding.yaml
    asserts:
      - isKind:
          of: RoleBinding
      - equal:
          path: roleRef.kind
          value: Role
      - equal:
          path: subjects[0].kind
          value: ServiceAccount
