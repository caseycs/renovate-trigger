suite: secret
templates:
  - templates/secret.yaml
tests:
  - it: always renders the Secret with both keys
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Secret
      - equal:
          path: type
          value: Opaque
      - exists:
          path: data.webhook-secret
      - exists:
          path: data.github-app-private-key

  - it: base64-encodes the webhook secret and the private key
    set:
      webhookSecret: s3cr3t
      github.privateKey: PEM-DATA
    asserts:
      - equal:
          path: data.webhook-secret
          value: s3cr3t
          decodeBase64: true
      - equal:
          path: data.github-app-private-key
          value: PEM-DATA
          decodeBase64: true
