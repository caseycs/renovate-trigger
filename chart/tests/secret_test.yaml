suite: secret
templates:
  - templates/secret.yaml
tests:
  - it: renders no Secret when webhookSecret is unset
    asserts:
      - hasDocuments:
          count: 0

  - it: renders a base64-encoded Secret when webhookSecret is set
    set:
      webhookSecret: s3cr3t
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: type
          value: Opaque
      - equal:
          path: data.webhook-secret
          value: s3cr3t
          decodeBase64: true
