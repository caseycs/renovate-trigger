suite: serviceaccount
templates:
  - templates/serviceaccount.yaml
tests:
  - it: creates a ServiceAccount by default
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ServiceAccount

  - it: creates nothing when serviceAccount.create is false
    set:
      serviceAccount.create: false
    asserts:
      - hasDocuments:
          count: 0
