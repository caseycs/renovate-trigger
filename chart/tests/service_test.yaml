suite: service
templates:
  - templates/service.yaml
tests:
  - it: exposes port 8080 targeting the http port by default
    asserts:
      - isKind:
          of: Service
      - equal:
          path: spec.type
          value: ClusterIP
      - equal:
          path: spec.ports[0].port
          value: 8080
      - equal:
          path: spec.ports[0].targetPort
          value: http

  - it: honours a custom service port
    set:
      service.port: 9090
    asserts:
      - equal:
          path: spec.ports[0].port
          value: 9090
