suite: deployment
templates:
  - templates/deployment.yaml
tests:
  - it: renders a single-replica Deployment
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: spec.replicas
          value: 1

  - it: defaults the image tag to the chart appVersion
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: ghcr.io/caseycs/renovate-trigger:0.1.0

  - it: honours an explicit image.tag override
    set:
      image.tag: "1.2.3"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: ghcr.io/caseycs/renovate-trigger:1.2.3

  - it: wires the core RT_* config into the container env
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: RT_LISTEN_ADDR
            value: ":8080"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: RT_LOG_LEVEL
            value: info
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: RT_BATCH_WINDOW_SECONDS
            value: "30"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: RT_CRONJOB_NAME
            value: renovate
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: RT_CRONJOB_NAMESPACE
            value: renovate

  - it: omits RT_REPOS and RT_WEBHOOK_SECRET when unset
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: RT_REPOS
          any: true
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: RT_WEBHOOK_SECRET
          any: true

  - it: joins config.repos into RT_REPOS when set
    set:
      config.repos:
        - org/dependent-a
        - org/dependent-b
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: RT_REPOS
            value: org/dependent-a,org/dependent-b

  - it: sources RT_WEBHOOK_SECRET from the Secret when webhookSecret is set
    set:
      webhookSecret: s3cr3t
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: RT_WEBHOOK_SECRET
          any: true
      - equal:
          path: spec.template.spec.containers[0].env[?(@.name=="RT_WEBHOOK_SECRET")].valueFrom.secretKeyRef.key
          value: webhook-secret

  - it: runs with a hardened security context
    asserts:
      - equal:
          path: spec.template.spec.securityContext.runAsNonRoot
          value: true
      - equal:
          path: spec.template.spec.containers[0].securityContext.readOnlyRootFilesystem
          value: true
      - equal:
          path: spec.template.spec.containers[0].securityContext.allowPrivilegeEscalation
          value: false
      - contains:
          path: spec.template.spec.containers[0].securityContext.capabilities.drop
          content: ALL
