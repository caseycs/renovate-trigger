suite: deployment
templates:
  - templates/deployment.yaml
tests:
  - it: renders a single-replica Deployment with a Recreate strategy
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: spec.replicas
          value: 1
      - equal:
          path: spec.strategy.type
          value: Recreate

  - it: defaults the image tag to the chart appVersion
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: ghcr.io/caseycs/renovate-trigger:0.1.0

  - it: honours an explicit image.tag override
    set:
      image.tag: "1.2.3"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: ghcr.io/caseycs/renovate-trigger:1.2.3

  - it: wires the core RT_* config into the container env
    release:
      namespace: renovate
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: RT_LISTEN_ADDR
            value: ":8080"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: RT_LOG_LEVEL
            value: info
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: RT_BATCH_WINDOW_SECONDS
            value: "30"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: RT_CRONJOB_NAME
            value: renovate
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: RT_GITHUB_APP_PRIVATE_KEY_FILE
            value: /etc/renovate-trigger/github-app.pem

  - it: defaults RT_CRONJOB_NAMESPACE to the release namespace
    release:
      namespace: renovate
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: RT_CRONJOB_NAMESPACE
            value: renovate

  - it: sets RT_GITHUB_CLIENT_ID from github.clientId
    set:
      github.clientId: Iv23liABC
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: RT_GITHUB_CLIENT_ID
            value: Iv23liABC

  - it: never sets the removed RT_REPOS env
    set:
      config.repos:
        - org/dependent-a
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: RT_REPOS
          any: true

  - it: always sources RT_WEBHOOK_SECRET from the Secret
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: RT_WEBHOOK_SECRET
          any: true
      - equal:
          path: spec.template.spec.containers[0].env[?(@.name=="RT_WEBHOOK_SECRET")].valueFrom.secretKeyRef.key
          value: webhook-secret

  - it: mounts the App private key from the Secret
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: github-app-key
            mountPath: /etc/renovate-trigger
            readOnly: true
      - equal:
          path: spec.template.spec.volumes[0].name
          value: github-app-key
      - equal:
          path: spec.template.spec.volumes[0].secret.items[0].key
          value: github-app-private-key
      - equal:
          path: spec.template.spec.volumes[0].secret.items[0].path
          value: github-app.pem

  - it: runs with a hardened security context
    asserts:
      - equal:
          path: spec.template.spec.securityContext.runAsNonRoot
          value: true
      - equal:
          path: spec.template.spec.containers[0].securityContext.readOnlyRootFilesystem
          value: true
      - equal:
          path: spec.template.spec.containers[0].securityContext.allowPrivilegeEscalation
          value: false
      - contains:
          path: spec.template.spec.containers[0].securityContext.capabilities.drop
          content: ALL
