apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "renovate-trigger.fullname" . }}
  labels:
    {{- include "renovate-trigger.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "renovate-trigger.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "renovate-trigger.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "renovate-trigger.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: RT_LISTEN_ADDR
              value: {{ .Values.config.listenAddr | quote }}
            - name: RT_LOG_LEVEL
              value: {{ .Values.config.logLevel | quote }}
            - name: RT_BATCH_WINDOW_SECONDS
              value: {{ .Values.config.batchWindowSeconds | quote }}
            - name: RT_CRONJOB_NAME
              value: {{ .Values.config.cronjob.name | quote }}
            - name: RT_CRONJOB_NAMESPACE
              value: {{ .Values.config.cronjob.namespace | quote }}
            {{- if .Values.config.repos }}
            - name: RT_REPOS
              value: {{ join "," .Values.config.repos | quote }}
            {{- end }}
            {{- if .Values.webhookSecret }}
            - name: RT_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "renovate-trigger.fullname" . }}
                  key: webhook-secret
            {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
