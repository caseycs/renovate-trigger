apiVersion: v1
kind: Secret
metadata:
  name: {{ include "renovate-trigger.fullname" . }}
  labels:
    {{- include "renovate-trigger.labels" . | nindent 4 }}
type: Opaque
data:
  # The GitHub App webhook secret (HMAC) and the App private key (PEM). Both are
  # required at runtime; the process crash-loops at startup if either is empty.
  webhook-secret: {{ .Values.webhookSecret | default "" | b64enc | quote }}
  github-app-private-key: {{ .Values.github.privateKey | default "" | b64enc | quote }}
