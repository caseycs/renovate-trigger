replicaCount: 1

image:
  repository: ghcr.io/org/renovate-trigger
  pullPolicy: IfNotPresent

config:
  listenAddr: ":8080"
  logLevel: "info"
  batchWindowSeconds: 30
  cronjob:
    name: "renovate"
    namespace: "renovate"
  repos: []

serviceAccount:
  create: true

rbac: {}

service:
  type: ClusterIP
  port: 8080

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

extraObjects: []
