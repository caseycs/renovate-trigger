replicaCount: 1

image:
  repository: ghcr.io/org/renovate-trigger
  tag: ""
  pullPolicy: IfNotPresent

config:
  listenAddr: ":8080"
  logLevel: "info"
  batchWindowSeconds: 30
  cronjob:
    name: "renovate"
    namespace: "renovate"
  repos:
    - "org/repo-a"
    - "org/repo-b"

webhookSecret: ""

serviceAccount:
  create: true
  name: ""

rbac:
  jobNamespace: "renovate"

service:
  type: ClusterIP
  port: 8080

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi
