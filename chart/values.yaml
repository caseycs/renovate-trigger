image:
  repository: ghcr.io/caseycs/renovate-trigger
  pullPolicy: IfNotPresent

# The single-replica invariant (ADR-0001) is enforced in the Deployment
# (replicas: 1 + Recreate); there is no replicaCount to change — in-memory
# batching and mutual exclusion require exactly one pod.

config:
  listenAddr: ":8080"
  logLevel: "info"
  batchWindowSeconds: 30
  cronjob:
    name: "renovate"
    # Namespace of the source Renovate CronJob. Defaults to the release
    # namespace — renovate-trigger is installed alongside the CronJob. Set only
    # to override.
    namespace: ""

# GitHub App credentials are read from an EXISTING Secret — the chart never
# creates one. Provision it out of band (e.g. External Secrets Operator) with the
# three keys below: the App client ID, the App private key (PEM), and the webhook
# secret.
existingSecret:
  name: renovate-trigger
  clientIdKey: github-client-id
  privateKeyKey: github-app-private-key
  webhookSecretKey: webhook-secret

serviceAccount:
  create: true

service:
  type: ClusterIP
  port: 8080

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

# Standard Kubernetes Ingress exposing the /webhook endpoint. Disabled by
# default; enable and fill in the host for your environment.
ingress:
  enabled: false
  className: ""
  annotations: {}
  host: renovate-trigger.example.com
  path: /webhook
  pathType: Prefix
  tls:
    enabled: false
    # Defaults to "<fullname>-tls" when empty.
    secretName: ""

# Traefik IngressRoute (traefik.io/v1alpha1) exposing the /webhook endpoint.
# Disabled by default; enable if your cluster routes via Traefik CRDs.
ingressRoute:
  enabled: false
  entryPoint: websecure
  host: renovate-trigger.example.com
  pathPrefix: /webhook
  # Extra metadata labels, e.g. { nobi.life/traefik-scope: external }.
  labels: {}
  tls:
    enabled: true
    # Defaults to "<fullname>-tls" when empty.
    secretName: ""

extraObjects: []
