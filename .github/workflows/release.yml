name: release

# Fires when you publish the draft release that release-drafter maintains.
# Publishing the draft is the manual "cut a release now" action; the tag it
# carries (vX.Y.Z) drives the version for both the image and the chart.
on:
  release:
    types: [published]

env:
  IMAGE: ghcr.io/caseycs/renovate-trigger
  CHART_REGISTRY: oci://ghcr.io/caseycs/charts

jobs:
  publish:
    name: publish image & chart
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Resolve version from tag
        id: version
        run: |
          tag="${{ github.event.release.tag_name }}"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # --- Docker image ---
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=latest

      - name: Build & push image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- Helm chart ---
      - uses: azure/setup-helm@v4

      - name: Package & push chart
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          helm registry login ghcr.io \
            --username "${{ github.actor }}" \
            --password "${{ secrets.GITHUB_TOKEN }}"
          helm package chart --version "$VERSION" --app-version "$VERSION"
          helm push "renovate-trigger-${VERSION}.tgz" "$CHART_REGISTRY"
