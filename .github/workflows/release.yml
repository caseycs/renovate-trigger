name: release

# release-please drives the whole flow. On every push to main it maintains a
# release PR that bumps chart/Chart.yaml (version + appVersion) and CHANGELOG.
# Merging that PR is the "cut a release now" action: release-please tags THAT
# commit and creates the GitHub Release, then — gated in the same run on
# release_created — we build the image and package the chart from the tagged
# commit, whose tree already carries the bumped version. Tag, files, and
# artifacts are consistent by construction.
on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

env:
  IMAGE: ghcr.io/caseycs/renovate-trigger
  CHART_REGISTRY: oci://ghcr.io/caseycs/charts

jobs:
  release-please:
    name: release-please
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  publish:
    name: publish image & chart
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      VERSION: ${{ needs.release-please.outputs.version }}
    steps:
      # Check out the tagged commit — its chart/Chart.yaml already holds VERSION.
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # --- Docker image ---
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=${{ env.VERSION }}
            type=raw,value=latest

      - name: Build & push image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- Helm chart ---
      - uses: azure/setup-helm@v4

      - name: Package & push chart
        run: |
          helm registry login ghcr.io \
            --username "${{ github.actor }}" \
            --password "${{ secrets.GITHUB_TOKEN }}"
          helm package chart --version "$VERSION" --app-version "$VERSION"
          helm push "renovate-trigger-${VERSION}.tgz" "$CHART_REGISTRY"
