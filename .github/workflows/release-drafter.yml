name: release-drafter

on:
  push:
    branches: [main]
  # pull_request(_target) lets the autolabeler tag PRs so version resolution
  # and changelog categories work without manual labeling.
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: read

jobs:
  update_release_draft:
    runs-on: ubuntu-latest
    permissions:
      contents: write # create/update the draft release
      pull-requests: write # autolabeler writes labels on PRs
    steps:
      - uses: release-drafter/release-drafter@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
