name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"

categories:
  - title: "🚀 Features"
    labels: ["feature", "enhancement"]
  - title: "🐛 Bug Fixes"
    labels: ["fix", "bugfix", "bug"]
  - title: "🧰 Maintenance"
    labels: ["chore", "ci", "docs", "refactor"]

# Fall back to Conventional Commit prefixes when a PR/commit has no labels,
# so direct pushes to main still resolve a version bump.
autolabeler:
  - label: "feature"
    title: ["/^feat(\\(.+\\))?:/"]
  - label: "fix"
    title: ["/^fix(\\(.+\\))?:/"]
  - label: "chore"
    title:
      ["/^(chore|ci|docs|refactor|build|test|style)(\\(.+\\))?:/"]

version-resolver:
  major:
    labels: ["major", "breaking"]
  minor:
    labels: ["minor", "feature", "enhancement"]
  patch:
    labels: ["patch", "fix", "bugfix", "bug", "chore", "ci", "docs", "refactor"]
  default: patch

change-template: "- $TITLE (#$NUMBER) @$AUTHOR"
change-title-escapes: '\<*_&'

template: |
  ## What's Changed

  $CHANGES

  **Full Changelog**: https://github.com/$OWNER/$REPOSITORY/compare/$PREVIOUS_TAG...v$RESOLVED_VERSION
